name: Publish to GitHub Pages

on:
  push:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check style rules (no U+2014)
        run: |
          dash=$(printf '\xe2\x80\x94')
          if grep -rn "$dash" --include="*.qmd" --include="*.R" --include="*.md" \
               --exclude-dir=.github --exclude-dir=docs --exclude-dir=.quarto .; then
            echo "Travessao longo encontrado. Usar virgulas, parenteses ou dois pontos."
            exit 1
          fi

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.5.57

      - name: Render Quarto Project
        run: quarto render

      - name: Deploy to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
